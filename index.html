<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Victor Emanuel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f3ef;
      --card: #ffffff;
      --text: #1a1a1a;
      --sub: #7a7a7a;
      --border: #e8e4de;
      --hover-bg: #1a1a1a;
      --hover-text: #f5f3ef;
      --shadow: 0 2px 24px rgba(0,0,0,0.06);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: var(--text);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
      animation: fadeUp 0.7s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .photo-wrap {
      position: relative;
      width: 108px;
      height: 108px;
      margin: 0 auto 1.6rem;
    }
    .photo-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
    }
    .photo-wrap img {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    .bio {
      font-size: 0.875rem;
      color: var(--sub);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 2rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      padding: 0.9rem 1.5rem;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: background 0.22s, color 0.22s, border-color 0.22s, transform 0.15s;
      cursor: pointer;
    }
    .btn:hover {
      background: var(--hover-bg);
      color: var(--hover-text);
      border-color: var(--hover-bg);
      transform: translateY(-2px);
    }
    .btn:hover svg { stroke: var(--hover-text); }
    .btn:hover .yt-bg { fill: var(--hover-text); }
    .btn:hover .yt-play { fill: var(--hover-bg); }
    .btn svg { width: 18px; height: 18px; flex-shrink: 0; transition: stroke 0.22s, fill 0.22s; }
    .btn:nth-child(1) { animation: fadeUp 0.7s 0.15s both; }
    .btn:nth-child(2) { animation: fadeUp 0.7s 0.25s both; }
    .btn:nth-child(3) { animation: fadeUp 0.7s 0.35s both; }
    .footer {
      margin-top: 2.5rem;
      font-size: 0.72rem;
      color: #ccc;
      letter-spacing: 0.05em;
    }
  </style>
</head>
